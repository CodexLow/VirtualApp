name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🛠️ FIX: We are switching to the 'VirtualApp' folder first
      - name: Grant execute permission for gradlew
        run: cd VirtualApp && chmod +x gradlew

      - name: Build debug APK
        run: cd VirtualApp && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
