name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 FIX: Use Java 8, because Gradle 4.1 is too old for 11 or 17!
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: cd VirtualApp && chmod +x gradlew

      # Creates local.properties so the SDK is found
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > VirtualApp/local.properties

      - name: Build debug APK
        run: cd VirtualApp && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
