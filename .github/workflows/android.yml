name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🛠️ STEP 1: Use Java 17 just to install the SDK tools and NDK
      - name: Set up JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install old Android SDK & NDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;25.0.0" "platforms;android-25" "ndk;21.4.7075529"

      # 🛠️ STEP 2: Create local.properties with both SDK AND NDK paths
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > VirtualApp/local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/21.4.7075529" >> VirtualApp/local.properties

      # 🛠️ STEP 3: Switch back to Java 8 for the actual Gradle 4.1 build
      - name: Set up JDK 8 for Gradle build
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission
        run: cd VirtualApp && chmod +x gradlew

      - name: Build debug APK
        run: cd VirtualApp && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
