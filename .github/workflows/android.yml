name: Build APK

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission
        run: cd VirtualApp && chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > VirtualApp/local.properties

      # 🛠️ Fix: Install the old SDK tools required by Gradle 4.1
      - name: Install old Android SDK components
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;25.0.0" "platforms;android-25"

      - name: Build debug APK
        run: cd VirtualApp && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: VirtualApp/app/build/outputs/apk/debug/app-debug.apk
